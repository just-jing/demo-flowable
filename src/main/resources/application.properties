server.port=8080

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:~/.h2/flowable_test
#spring.datasource.url=jdbc:h2:mem:flowable_test
spring.datasource.username=sa
spring.datasource.password=


###############################################################################
flowable.async-executor-activate=true
flowable.database-schema-update=true
flowable.check-process-definitions=true


###############################################################################
# \u521B\u5EFA\u8868
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.mode=always
# \u63D2\u5165\u6570\u636E
# spring.sql.init.data-locations=classpath:data.sql
# Spring\u542F\u52A8\u540E\uFF0C\u53EF\u4EE5\u67E5\u770B\u6570\u636E\u5E93,\u8BBF\u95EE localhost:8080/h2-console
spring.h2.console.path=/h2-console
spring.h2.console.enabled=true



###############################################################################
#\u4E0B\u9762\u8FD9\u4E9B\u5185\u5BB9\u662F\u4E3A\u4E86\u8BA9MyBatis\u6620\u5C04
#\u6307\u5B9AMybatis\u7684Mapper\u6587\u4EF6
mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.example.demoflowable.exporttask.entity
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.root=info

# 导出文件存储目录
export.task.file-dir=./export-files/
export.task.poll-interval=5000
export.task.max-concurrent=3
export.task.timeout-seconds=300
